[pytest]
# NeuralMigrate test configuration
# Run:  pytest          (runs all tests in this order)
#       pytest tests/test_api.py -v          (API only, mocked deps)
#       pytest tests/test_parsers.py -v      (real parser logic)
#       pytest tests/test_schema.py -v       (Pydantic + SQLite)

# Always run api tests first — they inject sys.modules stubs that must not
# bleed into parser/schema tests if run in the wrong order.
# Running them first and then restoring sys.modules (via fixture teardown)
# keeps the other test files clean.
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Ordering: api → schema → parsers
# (schema and parsers use real imports; api uses sys.modules stubs)
addopts =
    -p no:warnings
    --tb=short
    --strict-markers

markers =
    api: API endpoint tests (mocked external dependencies)
    unit: Pure unit tests (no external deps)
    integration: Tests requiring real databases or LLM connections
