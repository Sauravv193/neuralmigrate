name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Frontend build ──────────────────────────────────────────────────────────
  frontend:
    name: Frontend — build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  # ── Backend tests ───────────────────────────────────────────────────────────
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install fastapi uvicorn pydantic python-dotenv \
                      pytest httpx pytest-cov

      - name: Syntax check all Python files
        run: |
          for f in *.py; do
            python -m py_compile "$f" && echo "OK  $f" || exit 1
          done
          for f in tests/*.py; do
            python -m py_compile "$f" && echo "OK  $f" || exit 1
          done

      - name: Run schema + parser tests
        run: pytest tests/test_schema.py tests/test_parsers.py -v --tb=short

      - name: Run API tests (mocked dependencies)
        run: pytest tests/test_api.py -v --tb=short

      - name: Coverage report
        run: |
          pip install pytest-cov --quiet
          pytest tests/test_schema.py tests/test_parsers.py tests/test_api.py \
            --cov=. --cov-report=term-missing --cov-report=xml \
            -q 2>&1 | tail -20
