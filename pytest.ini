[pytest]
# Run test_api first (it stubs sys.modules), then the rest in isolation
# This prevents heavy-module stubs from bleeding into parser/schema tests
testpaths = backend/tests

# Run in this specific order
# test_api uses module-scoped sys.modules stubs that are properly restored
# test_parsers and test_schema use real imports (Tree-sitter, Pydantic)
addopts =
    --tb=short
    -v

# Treat warnings as non-fatal (FastAPI on_event deprecation is cosmetic)
filterwarnings =
    ignore::DeprecationWarning:fastapi.*:
    ignore::DeprecationWarning:starlette.*:
